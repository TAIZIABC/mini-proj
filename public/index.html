<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel-Agent · 工具链接解析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ==================================================================
       Design Tokens（Swiss Modernism 2.0 / 8px grid / AAA contrast）
       ================================================================= */
    :root {
      /* 主色 & 中性 */
      --brand-500: #4f46e5;   /* indigo-600，唯一 accent */
      --brand-600: #4338ca;
      --brand-50:  #eef2ff;

      --bg:        #fafafa;
      --surface:   #ffffff;
      --surface-2: #f4f4f5;
      --hover:     #f5f6fa;

      --border:    #e4e4e7;
      --border-strong: #d4d4d8;

      --text-1:    #09090b;   /* 主文本 AAA */
      --text-2:    #3f3f46;   /* 次级 */
      --text-3:    #71717a;   /* 辅助 */

      --success:   #16a34a;
      --danger:    #dc2626;
      --warning:   #d97706;

      /* 几何 & 动效 */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-1:  0 1px 2px rgba(16, 24, 40, .04), 0 1px 3px rgba(16, 24, 40, .06);
      --shadow-2:  0 4px 12px rgba(16, 24, 40, .06), 0 1px 2px rgba(16, 24, 40, .04);
      --ring:      0 0 0 3px rgba(79, 70, 229, .18);

      --dur:       200ms;
      --ease:      cubic-bezier(.4, 0, .2, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text-1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: var(--brand-500); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ==================================================================
       Layout
       ================================================================= */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.82);
      backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 1080px; margin: 0 auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 15px; letter-spacing: -.01em;
    }
    .brand-mark {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--brand-500);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .brand-sub { color: var(--text-3); font-weight: 400; font-size: 13px; }
    .status-dot {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-2);
      padding: 4px 10px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border);
    }
    .status-dot::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--success); box-shadow: 0 0 0 3px rgba(22,163,74,.18);
    }

    main {
      max-width: 1080px; margin: 0 auto;
      padding: 32px 24px 64px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 24px;
    }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
    }

    .page-title {
      grid-column: 1 / -1;
      margin: 0 0 8px;
      font-size: 28px; font-weight: 700; letter-spacing: -.02em;
    }
    .page-desc {
      grid-column: 1 / -1;
      margin: 0 0 24px;
      color: var(--text-2); font-size: 15px;
    }

    /* ==================================================================
       Cards / Steps
       ================================================================= */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .card-head {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .card-head .idx {
      flex: 0 0 24px; width: 24px; height: 24px;
      border-radius: 6px;
      background: var(--brand-50); color: var(--brand-600);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .card-head h3 {
      margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -.005em;
    }
    .card-head .hint { margin-left: auto; color: var(--text-3); font-size: 12px; }
    .card-body { padding: 20px 22px; }

    /* ==================================================================
       Buttons / Forms
       ================================================================= */
    button, .btn {
      appearance: none; border: 0; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 500;
      padding: 9px 18px;
      border-radius: var(--radius-md);
      transition: background-color var(--dur) var(--ease),
                  color var(--dur) var(--ease),
                  border-color var(--dur) var(--ease),
                  box-shadow var(--dur) var(--ease);
      display: inline-flex; align-items: center; gap: 8px;
      line-height: 1;
    }
    .btn-primary {
      background: var(--brand-500); color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--brand-600); }
    .btn-primary:disabled { background: #a1a1aa; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-1);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--hover); border-color: var(--border-strong); }

    :focus-visible { outline: none; box-shadow: var(--ring); }

    /* File dropzone */
    .dropzone {
      position: relative;
      border: 1.5px dashed var(--border-strong);
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex; align-items: center; gap: 14px;
      transition: background-color var(--dur), border-color var(--dur);
      cursor: pointer;
    }
    .dropzone:hover { background: var(--hover); border-color: var(--brand-500); }
    .dropzone.is-drag { background: var(--brand-50); border-color: var(--brand-500); }
    .dropzone .icon {
      width: 40px; height: 40px; flex: 0 0 40px;
      border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--brand-500);
      display: flex; align-items: center; justify-content: center;
    }
    .dropzone .texts { min-width: 0; flex: 1; }
    .dropzone .texts .t1 { font-weight: 500; color: var(--text-1); }
    .dropzone .texts .t2 { color: var(--text-3); font-size: 12px; margin-top: 2px; }
    .dropzone .texts .fname { color: var(--brand-600); font-weight: 500; }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    .actions-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
    .actions-row .muted { color: var(--text-3); font-size: 12px; }

    /* Result blocks */
    .alert {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 13px; line-height: 1.6;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .alert.ok   { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .alert.err  { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .alert.info { background: var(--surface-2); color: var(--text-2); }
    .alert svg { flex: 0 0 18px; margin-top: 1px; }

    pre {
      margin: 10px 0 0;
      background: #0f172a; color: #e2e8f0;
      padding: 14px 16px; border-radius: var(--radius-md);
      font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.6;
      max-height: 240px; overflow: auto;
    }
    code {
      font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      background: var(--surface-2); padding: 1px 6px; border-radius: 4px;
      color: var(--text-1);
    }

    /* QR 结果 */
    .qr-box {
      margin-top: 14px;
      padding: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
    }
    .qr-box img {
      width: 200px; height: 200px; object-fit: contain;
      background: #fff; padding: 8px;
      border-radius: var(--radius-md); border: 1px solid var(--border);
    }
    .qr-meta .t1 { font-weight: 500; margin-bottom: 4px; }
    .qr-meta .t2 { color: var(--text-3); font-size: 12px; word-break: break-all; }

    /* ==================================================================
       Chat sidebar
       ================================================================= */
    .chat {
      position: sticky; top: 76px;
      height: calc(100vh - 293px);
      display: flex; flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    @media (max-width: 960px) {
      .chat { position: static; height: auto; min-height: 600px; }
    }
    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .chat-head .icon-wrap {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--brand-50); color: var(--brand-600);
      display: flex; align-items: center; justify-content: center;
    }
    .chat-head .t1 { font-weight: 600; font-size: 14px; }
    .chat-head .t2 { color: var(--text-3); font-size: 12px; }

    .chat-log {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex; flex-direction: column; gap: 14px;
      background:
        radial-gradient(circle at 1px 1px, rgba(0,0,0,.035) 1px, transparent 0)
        0 0 / 20px 20px var(--surface);
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg .avatar {
      flex: 0 0 30px; width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .msg.user .avatar { background: var(--text-1); }
    .msg.bot  .avatar { background: var(--brand-500); }
    .bubble {
      max-width: 82%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 13.5px; line-height: 1.65;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--brand-500); color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.bot .bubble {
      background: var(--surface-2); color: var(--text-1);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .bubble .body { white-space: pre-wrap; }
    .bubble strong { font-weight: 600; }
    .bubble code {
      background: rgba(0,0,0,.06);
      color: inherit;
    }
    .msg.user .bubble code { background: rgba(255,255,255,.22); }
    .msg.user .bubble a { color: #fff; text-decoration: underline; }

    .tool-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tool-chip {
      appearance: none; cursor: pointer;
      font-size: 11px; font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      background: #fff; color: var(--text-2);
      border: 1px solid var(--border);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .tool-chip:hover { background: var(--hover); border-color: var(--border-strong); }
    .tool-detail {
      grid-column: 1 / -1;
      margin-top: 4px;
      font-size: 11.5px; color: var(--text-2);
      background: #fff;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      white-space: pre-wrap;
      font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
      display: none;
      max-height: 220px; overflow: auto;
    }
    .tool-detail.open { display: block; }

    .inline-qr {
      margin-top: 10px;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .inline-qr img { width: 160px; height: 160px; object-fit: contain; }
    .inline-qr .cap { color: var(--text-3); font-size: 11px; margin-top: 6px; }

    .chat-input-wrap {
      padding: 12px 14px 10px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .chat-input {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 4px 4px 4px 14px;
      transition: border-color var(--dur), box-shadow var(--dur);
    }
    .chat-input:focus-within {
      border-color: var(--brand-500);
      box-shadow: var(--ring);
      background: var(--surface);
    }
    .chat-input input {
      flex: 1; min-width: 0;
      border: 0; outline: none; background: transparent;
      font: inherit; font-size: 14px; color: var(--text-1);
      padding: 8px 0;
    }
    .chat-input input::placeholder { color: var(--text-3); }
    .chat-input button {
      width: 34px; height: 34px; padding: 0;
      border-radius: 50%;
      background: var(--brand-500); color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-input button:hover:not(:disabled) { background: var(--brand-600); }
    .chat-input button:disabled { background: #a1a1aa; cursor: not-allowed; }

    .quick {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .quick button {
      font-size: 12px; padding: 6px 10px;
      background: var(--surface-2); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 999px;
    }
    .quick button:hover:not(:disabled) { background: var(--hover); color: var(--text-1); }

    /* Typing dots */
    .typing { display: inline-flex; gap: 3px; padding: 2px 0; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3);
      animation: typingDot 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: .25; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Hide accessibly */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>

  <!-- Icon sprite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></symbol>
      <symbol id="i-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></symbol>
      <symbol id="i-qr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3z M18 18h3 M14 21h3 M21 14v3"/></symbol>
      <symbol id="i-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
      <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
      <symbol id="i-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></symbol>
      <symbol id="i-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></symbol>
      <symbol id="i-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/><path d="M19 17l.9 2.1L22 20l-2.1.9L19 23l-.9-2.1L16 20l2.1-.9L19 17z"/></symbol>
      <symbol id="i-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></symbol>
    </defs>
  </svg>

  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="16" height="16"><use href="#i-zap" /></svg>
        </span>
        <span>Excel-Agent</span>
        <span class="brand-sub">· 工具链接解析与预览</span>
      </div>
      <span class="status-dot" id="statusDot" aria-live="polite">服务运行中</span>
    </div>
  </header>

  <main id="main">
    <h1 class="page-title">解析 Excel · 生成预览码 · 对话驱动</h1>
    <p class="page-desc">上传含 <code>&lt;a&gt;</code> 标签的工具链接表格，自动解析为 <code>data.json</code>；按需获取小程序预览二维码；或直接用自然语言指挥 Agent。</p>

    <!-- LEFT COLUMN: Steps -->
    <section aria-label="操作步骤" style="display: flex; flex-direction: column; gap: 20px;">

      <!-- Step 1: Upload -->
      <article class="card" aria-labelledby="step1-title">
        <div class="card-head">
          <span class="idx">1</span>
          <h3 id="step1-title">上传 Excel</h3>
          <span class="hint">支持 .xlsx / .xls / .csv · ≤20MB</span>
        </div>
        <div class="card-body">
          <label class="dropzone" id="dropzone" for="file">
            <span class="icon" aria-hidden="true">
              <svg width="20" height="20"><use href="#i-upload" /></svg>
            </span>
            <div class="texts">
              <div class="t1" id="dropzoneT1">拖拽文件到此处，或点击选择</div>
              <div class="t2" id="dropzoneT2">解析完成后自动生成 data.json 并可对外访问</div>
            </div>
            <input type="file" id="file" accept=".xlsx,.xls,.csv" aria-label="选择 Excel 文件" />
          </label>

          <div class="actions-row">
            <button class="btn btn-primary" id="btnUpload" type="button">
              <svg width="16" height="16" aria-hidden="true"><use href="#i-upload" /></svg>
              开始解析
            </button>
            <span class="muted" id="uploadHint">未选择文件</span>
          </div>

          <div id="uploadResult" aria-live="polite"></div>
        </div>
      </article>

      <!-- Step 2: Preview QR -->
      <article class="card" aria-labelledby="step2-title">
        <div class="card-head">
          <span class="idx">2</span>
          <h3 id="step2-title">获取小程序预览码</h3>
          <span class="hint">调用本地 30747 接口</span>
        </div>
        <div class="card-body">
          <div class="actions-row">
            <button class="btn btn-primary" id="btnPreview" type="button">
              <svg width="16" height="16" aria-hidden="true"><use href="#i-qr" /></svg>
              获取预览码
            </button>
            <button class="btn btn-ghost" id="btnRefreshPreview" type="button" title="重新获取">
              <svg width="16" height="16" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              刷新
            </button>
          </div>
          <div id="previewResult" aria-live="polite"></div>
        </div>
      </article>
    </section>

    <!-- RIGHT COLUMN: Chat -->
    <aside class="chat" aria-label="Agent 对话">
      <div class="chat-head">
        <span class="icon-wrap" aria-hidden="true">
          <svg width="16" height="16"><use href="#i-sparkles" /></svg>
        </span>
        <div>
          <div class="t1">Agent 助手</div>
          <div class="t2">自然语言指挥：解析、预览、查询</div>
        </div>
      </div>

      <div id="chatLog" class="chat-log" role="log" aria-live="polite">
        <div class="msg bot">
          <div class="avatar" aria-hidden="true">
            <svg width="16" height="16"><use href="#i-sparkles" /></svg>
          </div>
          <div class="bubble">
            <div class="body">你好，我可以帮你解析 Excel、获取预览码、查询 <code>data.json</code>。试试下方快捷指令，或直接输入问题。</div>
          </div>
        </div>
      </div>

      <div class="chat-input-wrap">
        <label for="chatInput" class="sr-only">聊天输入框</label>
        <div class="chat-input">
          <input id="chatInput" placeholder="data.json 里 type=h5 的有几条？" autocomplete="off" />
          <button id="btnSend" type="button" aria-label="发送消息">
            <svg width="15" height="15" aria-hidden="true"><use href="#i-send" /></svg>
          </button>
        </div>
        <div class="quick" role="group" aria-label="快捷指令">
          <button type="button" data-q="重新获取一次小程序预览码">重拿预览码</button>
          <button type="button" data-q="data.json 里 type 分布情况是怎样的？">type 分布</button>
          <button type="button" data-q="给我 data.json 里前 5 条 type=h5 的链接">前 5 条 h5</button>
          <button type="button" data-q="data.json 总共有多少条记录？">总条数</button>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    /* ---------------- Step 1: Upload ---------------- */
    const fileInput = $('file');
    const dropzone = $('dropzone');
    const dzT1 = $('dropzoneT1');
    const dzT2 = $('dropzoneT2');
    const uploadHint = $('uploadHint');

    function onFilePicked() {
      const f = fileInput.files && fileInput.files[0];
      if (f) {
        dzT1.innerHTML = `已选择：<span class="fname">${escapeHtml(f.name)}</span>`;
        dzT2.textContent = `${(f.size/1024).toFixed(1)} KB`;
        uploadHint.textContent = '可以点击"开始解析"';
      } else {
        dzT1.textContent = '拖拽文件到此处，或点击选择';
        dzT2.textContent = '解析完成后自动生成 data.json 并可对外访问';
        uploadHint.textContent = '未选择文件';
      }
    }
    fileInput.addEventListener('change', onFilePicked);

    ['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => {
      e.preventDefault(); dropzone.classList.add('is-drag');
    }));
    ['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => {
      e.preventDefault(); dropzone.classList.remove('is-drag');
    }));
    dropzone.addEventListener('drop', e => {
      const f = e.dataTransfer?.files?.[0];
      if (f) { fileInput.files = e.dataTransfer.files; onFilePicked(); }
    });

    $('btnUpload').addEventListener('click', async () => {
      const out = $('uploadResult');
      out.innerHTML = '';
      const f = fileInput.files && fileInput.files[0];
      if (!f) {
        out.innerHTML = alertHtml('err', '请先选择一个 Excel 文件');
        return;
      }
      const fd = new FormData();
      fd.append('file', f);
      $('btnUpload').disabled = true;
      $('btnUpload').innerHTML = '<svg width="16" height="16"><use href="#i-upload"/></svg>解析中...';
      try {
        const resp = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!data.ok) {
          out.innerHTML = alertHtml('err', '解析失败：' + (data.error || '未知错误'));
          return;
        }
        out.innerHTML = alertHtml('ok', `解析成功，共 <strong>${data.recordCount}</strong> 条记录。data.json：<a href="${data.dataJsonUrl}" target="_blank">${data.dataJsonUrl}</a>`);
      } catch (e) {
        out.innerHTML = alertHtml('err', '请求失败：' + e.message);
      } finally {
        $('btnUpload').disabled = false;
        $('btnUpload').innerHTML = '<svg width="16" height="16"><use href="#i-upload"/></svg>开始解析';
      }
    });

    function alertHtml(level, bodyHtml) {
      const iconId = level === 'ok' ? 'i-check' : level === 'err' ? 'i-x' : 'i-info';
      return `<div class="alert ${level}" role="alert">
        <svg width="18" height="18" aria-hidden="true"><use href="#${iconId}"/></svg>
        <div>${bodyHtml}</div>
      </div>`;
    }

    /* ---------------- Step 2: Preview ---------------- */
    async function fetchPreview() {
      const out = $('previewResult');
      out.innerHTML = '';
      const btn = $('btnPreview');
      btn.disabled = true;
      btn.innerHTML = '<svg width="16" height="16"><use href="#i-qr"/></svg>获取中...';
      try {
        const resp = await fetch('/api/preview');
        const data = await resp.json();
        if (!data.ok) {
          out.innerHTML = alertHtml('err', '获取失败：' + (data.error || '未知错误'));
          return;
        }
        if (data.type === 'image') {
          out.innerHTML = `
            <div class="qr-box">
              <img src="${data.publicUrl}" alt="小程序预览二维码" />
              <div class="qr-meta">
                <div class="t1">扫码预览小程序</div>
                <div class="t2">图片：<a href="${data.publicUrl}" target="_blank">${data.publicUrl}</a></div>
              </div>
            </div>`;
        } else {
          out.innerHTML = `${alertHtml('info', '接口返回 ' + data.type)}<pre>${escapeHtml(typeof data.data === 'string' ? data.data : JSON.stringify(data.data, null, 2))}</pre>`;
        }
      } catch (e) {
        out.innerHTML = alertHtml('err', '请求失败：' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16"><use href="#i-qr"/></svg>获取预览码';
      }
    }
    $('btnPreview').addEventListener('click', fetchPreview);
    $('btnRefreshPreview').addEventListener('click', fetchPreview);

    /* ---------------- Step 3: Chat ---------------- */
    const chatLog = $('chatLog');

    function renderMarkdown(text) {
      let s = escapeHtml(String(text || ''));
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    }

    const TOOL_LABELS = {
      parse_excel_to_json: '解析 Excel',
      fetch_preview_qr:    '获取预览码',
      query_data_json:     '查询 data.json',
    };

    function renderInlineArtifacts(toolCalls) {
      if (!Array.isArray(toolCalls)) return '';
      const parts = [];
      toolCalls.forEach((c) => {
        if (c.name === 'fetch_preview_qr' && c.result && c.result.ok && c.result.publicUrl) {
          const url = escapeHtml(c.result.publicUrl);
          parts.push(`
            <div class="inline-qr">
              <img src="${url}" alt="小程序预览码" />
              <div class="cap"><a href="${url}" target="_blank" rel="noopener">在新标签打开</a></div>
            </div>`);
        }
      });
      return parts.join('');
    }

    function buildMsg(role, body, toolCalls) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.innerHTML = role === 'user'
        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
        : `<svg width="14" height="14"><use href="#i-sparkles"/></svg>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'body';
      bodyDiv.innerHTML = renderMarkdown(body);
      bubble.appendChild(bodyDiv);

      const artifacts = renderInlineArtifacts(toolCalls);
      if (artifacts) {
        const box = document.createElement('div');
        box.innerHTML = artifacts;
        bubble.appendChild(box);
      }

      if (Array.isArray(toolCalls) && toolCalls.length) {
        const chips = document.createElement('div');
        chips.className = 'tool-chips';
        toolCalls.forEach((c, i) => {
          const label = TOOL_LABELS[c.name] || c.name || 'tool';
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'tool-chip';
          chip.setAttribute('aria-expanded', 'false');
          chip.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>${escapeHtml(label)}`;
          const detail = document.createElement('div');
          detail.className = 'tool-detail';
          const argsStr = typeof c.args === 'string' ? c.args : JSON.stringify(c.args || {}, null, 2);
          const resStr  = c.result === undefined ? '(no result)'
                        : typeof c.result === 'string' ? c.result
                        : JSON.stringify(c.result, null, 2);
          detail.textContent = `#${i+1} ${c.name}\nargs: ${argsStr}\nresult: ${resStr}`;
          chip.addEventListener('click', () => {
            const open = detail.classList.toggle('open');
            chip.setAttribute('aria-expanded', open ? 'true' : 'false');
          });
          chips.appendChild(chip);
          chips.appendChild(detail);
        });
        bubble.appendChild(chips);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      return wrap;
    }

    function appendMsg(role, body, toolCalls) {
      chatLog.appendChild(buildMsg(role, body, toolCalls));
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function appendTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `
        <div class="avatar" aria-hidden="true"><svg width="14" height="14"><use href="#i-sparkles"/></svg></div>
        <div class="bubble"><div class="body"><span class="typing"><span></span><span></span><span></span></span></div></div>`;
      chatLog.appendChild(wrap);
      chatLog.scrollTop = chatLog.scrollHeight;
      return wrap;
    }

    async function sendChat(q) {
      const text = (q || $('chatInput').value || '').trim();
      if (!text) return;
      $('chatInput').value = '';
      appendMsg('user', text);
      const placeholder = appendTyping();
      $('btnSend').disabled = true;
      try {
        const resp = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await resp.json();
        chatLog.removeChild(placeholder);
        if (!data.ok) appendMsg('bot', '出错了：' + (data.error || '未知错误'));
        else          appendMsg('bot', data.content || '(无内容)', data.toolCalls);
      } catch (e) {
        chatLog.removeChild(placeholder);
        appendMsg('bot', '请求失败：' + e.message);
      } finally {
        $('btnSend').disabled = false;
      }
    }

    $('btnSend').addEventListener('click', () => sendChat());
    $('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
    document.querySelectorAll('.quick button').forEach((btn) => {
      btn.addEventListener('click', () => sendChat(btn.getAttribute('data-q')));
    });

    /* ---------------- 健康状态 ---------------- */
    fetch('/api/health').then(r => r.ok ? null : Promise.reject()).catch(() => {
      $('statusDot').textContent = '服务异常';
      $('statusDot').style.setProperty('--success', '#dc2626');
    });
  </script>
</body>
</html>
