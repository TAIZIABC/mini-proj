<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel-Agent · 上传 & 预览码</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 880px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 32px;
      text-align: center;
    }
    .header h1 { margin: 0; font-size: 26px; }
    .header p { margin: 8px 0 0; opacity: .9; font-size: 14px; }
    .body { padding: 28px 32px 36px; }

    .step {
      border: 1px solid #eef0f4;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 18px;
      background: #fafbfd;
    }
    .step h2 {
      margin: 0 0 14px;
      font-size: 16px;
      color: #2d3748;
      display: flex; align-items: center; gap: 10px;
    }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      background: #667eea; color: #fff; font-size: 13px; font-weight: 600;
    }

    .uploader {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    input[type="file"] {
      flex: 1; min-width: 240px;
      padding: 10px 12px;
      border: 1px dashed #cbd5e0;
      border-radius: 8px;
      background: #fff;
    }
    button {
      padding: 10px 20px;
      border: 0;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: .2s;
    }
    button:hover:not(:disabled) { background: #5568d3; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .result {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
    }
    .result.ok { background: #f0fff4; border: 1px solid #9ae6b4; color: #22543d; }
    .result.err { background: #fff5f5; border: 1px solid #feb2b2; color: #742a2a; }
    .result a { color: #5a67d8; text-decoration: underline; }

    pre {
      background: #1a202c; color: #e2e8f0;
      padding: 14px; border-radius: 8px;
      overflow: auto; max-height: 240px;
      font-size: 12px; margin: 10px 0 0;
    }

    .qr-box {
      margin-top: 14px;
      text-align: center;
      padding: 18px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .qr-box img { max-width: 260px; width: 100%; }
    .muted { color: #718096; font-size: 12px; margin-top: 8px; }

    /* ============ 聊天区（iM 气泡风格） ============ */
    .chat-log {
      max-height: 420px;
      overflow-y: auto;
      background: linear-gradient(180deg, #f7fafc 0%, #edf2f7 100%);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 100%;
    }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      flex: 0 0 32px;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }
    .msg.user .avatar  { background: linear-gradient(135deg, #4299e1, #3182ce); }
    .msg.bot .avatar   { background: linear-gradient(135deg, #48bb78, #38a169); }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      position: relative;
    }
    .msg.user .bubble {
      background: #4299e1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #fff;
      color: #1a202c;
      border-bottom-left-radius: 4px;
    }
    .bubble .body { white-space: pre-wrap; }
    .bubble .body code {
      background: rgba(0,0,0,.08);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: Menlo, Consolas, monospace;
    }
    .msg.user .bubble .body code { background: rgba(255,255,255,.2); }
    .bubble .body strong { font-weight: 600; }

    /* 工具调用徽章（折叠） */
    .tool-chips {
      margin-top: 8px;
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .tool-chip {
      font-size: 11px;
      background: #edf2f7;
      color: #4a5568;
      padding: 2px 8px;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
    }
    .tool-chip:hover { background: #e2e8f0; }
    .tool-detail {
      margin-top: 6px;
      font-size: 11px;
      color: #4a5568;
      background: #f7fafc;
      border-left: 3px solid #cbd5e0;
      padding: 6px 10px;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: Menlo, Consolas, monospace;
      display: none;
    }
    .tool-detail.open { display: block; }

    /* 聊天里的图片（预览码） */
    .inline-qr {
      margin-top: 10px;
      padding: 10px;
      background: #fafbfd;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
    }
    .inline-qr img { max-width: 220px; width: 100%; border-radius: 4px; }
    .inline-qr .hint { color: #718096; font-size: 11px; margin-top: 6px; }

    /* 输入区 */
    .chat-input { display: flex; gap: 8px; }
    .chat-input input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 22px;
      font-size: 14px;
      transition: border-color .2s;
    }
    .chat-input input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,.15);
    }
    .chat-input button {
      padding: 10px 22px;
      border-radius: 22px;
    }
    .quick {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .quick button {
      padding: 5px 12px; font-size: 12px;
      background: #fff;
      color: #2d3748;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
    }
    .quick button:hover:not(:disabled) { background: #edf2f7; }

    /* 思考中 3 个点动效 */
    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 1px;
      background: #a0aec0;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: .2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Excel-Agent</h1>
      <p>上传 Excel → 解析为规则 JSON → 获取小程序预览码</p>
    </div>
    <div class="body">

      <!-- Step 1 -->
      <div class="step">
        <h2><span class="badge">1</span>上传 Excel 文件</h2>
        <div class="uploader">
          <input type="file" id="file" accept=".xlsx,.xls,.csv" />
          <button id="btnUpload">上传并解析</button>
        </div>
        <div id="uploadResult"></div>
      </div>

      <!-- Step 2 -->
      <div class="step">
        <h2><span class="badge">2</span>获取小程序预览码</h2>
        <div class="uploader">
          <button id="btnPreview">获取预览码</button>
          <span class="muted">将调用本地 30747 端口接口</span>
        </div>
        <div id="previewResult"></div>
      </div>

      <!-- Step 3 -->
      <div class="step">
        <h2><span class="badge">3</span>自然语言入口（Agent）</h2>
        <div id="chatLog" class="chat-log">
          <div class="msg bot">
            <div class="avatar">🤖</div>
            <div class="bubble">
              <div class="body">你好，我可以帮你解析 Excel、获取预览码、查询 data.json 内容。试试下面的快捷指令，或直接输入问题。</div>
            </div>
          </div>
        </div>
        <div class="chat-input">
          <input id="chatInput" placeholder="例如：data.json 里有几条 type=h5 的？" />
          <button id="btnSend">发送</button>
        </div>
        <div class="quick">
          <button data-q="重新获取一次小程序预览码">🎯 重拿预览码</button>
          <button data-q="data.json 里 type 分布情况是怎样的？">📊 type 分布</button>
          <button data-q="给我 data.json 里前 5 条 type=h5 的链接">🔍 前 5 条 h5</button>
          <button data-q="data.json 总共有多少条记录？">🔢 总条数</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    $('btnUpload').addEventListener('click', async () => {
      const fileInput = $('file');
      const out = $('uploadResult');
      out.innerHTML = '';

      if (!fileInput.files || !fileInput.files[0]) {
        out.innerHTML = '<div class="result err">请先选择一个 Excel 文件</div>';
        return;
      }

      const fd = new FormData();
      fd.append('file', fileInput.files[0]);

      $('btnUpload').disabled = true;
      $('btnUpload').textContent = '解析中...';

      try {
        const resp = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!data.ok) {
          out.innerHTML = `<div class="result err">解析失败：${data.error || '未知错误'}</div>`;
          return;
        }
        out.innerHTML = `
          <div class="result ok">
            ✅ 解析成功，共 <b>${data.recordCount}</b> 条记录<br/>
            data.json 访问地址：<a href="${data.dataJsonUrl}" target="_blank">${data.dataJsonUrl}</a>
          </div>
          <pre>${escapeHtml(JSON.stringify(data.preview, null, 2))}</pre>
        `;
      } catch (e) {
        out.innerHTML = `<div class="result err">请求失败：${e.message}</div>`;
      } finally {
        $('btnUpload').disabled = false;
        $('btnUpload').textContent = '上传并解析';
      }
    });

    $('btnPreview').addEventListener('click', async () => {
      const out = $('previewResult');
      out.innerHTML = '';
      $('btnPreview').disabled = true;
      $('btnPreview').textContent = '获取中...';

      try {
        const resp = await fetch('/api/preview');
        const data = await resp.json();
        if (!data.ok) {
          out.innerHTML = `<div class="result err">获取失败：${data.error || '未知错误'}</div>`;
          return;
        }
        if (data.type === 'image') {
          out.innerHTML = `
            <div class="qr-box">
              <img src="${data.publicUrl}" alt="小程序预览码" />
              <div class="muted">扫码即可在微信中预览小程序</div>
              <div class="muted">图片地址：<a href="${data.publicUrl}" target="_blank">${data.publicUrl}</a></div>
            </div>`;
        } else {
          out.innerHTML = `
            <div class="result ok">接口返回 (${data.type}):</div>
            <pre>${escapeHtml(typeof data.data === 'string' ? data.data : JSON.stringify(data.data, null, 2))}</pre>
          `;
        }
      } catch (e) {
        out.innerHTML = `<div class="result err">请求失败：${e.message}</div>`;
      } finally {
        $('btnPreview').disabled = false;
        $('btnPreview').textContent = '获取预览码';
      }
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    /* ---------- Step 3: 聊天 ---------- */
    const chatLog = $('chatLog');

    // 极简 markdown 渲染：**bold** / `code`，其余保留纯文本并安全转义
    function renderMarkdown(text) {
      let s = escapeHtml(String(text || ''));
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return s;
    }

    // 工具名 → 中文显示名
    const TOOL_LABELS = {
      parse_excel_to_json: '📄 解析 Excel',
      fetch_preview_qr:    '📱 获取预览码',
      query_data_json:     '📊 查询 data.json',
    };

    /**
     * 从 toolCalls 里抽取"可在聊天气泡内内嵌展示"的特殊内容：
     * - fetch_preview_qr：内嵌二维码图片
     * 返回 HTML 字符串（可能为空）
     */
    function renderInlineArtifacts(toolCalls) {
      if (!Array.isArray(toolCalls)) return '';
      const parts = [];
      toolCalls.forEach((c) => {
        if (c.name === 'fetch_preview_qr' && c.result && c.result.ok && c.result.publicUrl) {
          const url = escapeHtml(c.result.publicUrl);
          parts.push(`
            <div class="inline-qr">
              <img src="${url}" alt="小程序预览码" />
              <div class="hint">扫码预览 · <a href="${url}" target="_blank">原图</a></div>
            </div>
          `);
        }
      });
      return parts.join('');
    }

    /** 构造一条消息 DOM */
    function buildMsg(role, body, toolCalls) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '我' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'body';
      bodyDiv.innerHTML = renderMarkdown(body);
      bubble.appendChild(bodyDiv);

      // 内嵌产物（如预览码图片）
      const artifacts = renderInlineArtifacts(toolCalls);
      if (artifacts) {
        const box = document.createElement('div');
        box.innerHTML = artifacts;
        bubble.appendChild(box);
      }

      // 工具 chip + 详情
      if (Array.isArray(toolCalls) && toolCalls.length) {
        const chips = document.createElement('div');
        chips.className = 'tool-chips';
        toolCalls.forEach((c, i) => {
          const chip = document.createElement('span');
          chip.className = 'tool-chip';
          chip.textContent = TOOL_LABELS[c.name] || ('🔧 ' + (c.name || 'tool'));
          const detail = document.createElement('div');
          detail.className = 'tool-detail';
          const argsStr = typeof c.args === 'string' ? c.args : JSON.stringify(c.args || {}, null, 2);
          const resStr  = c.result === undefined ? '(无)' :
                          typeof c.result === 'string' ? c.result : JSON.stringify(c.result, null, 2);
          detail.textContent = `#${i+1} ${c.name}\n入参：${argsStr}\n结果：${resStr}`;
          chip.addEventListener('click', () => detail.classList.toggle('open'));
          chips.appendChild(chip);
          chips.appendChild(detail);
        });
        bubble.appendChild(chips);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      return wrap;
    }

    function appendMsg(role, body, toolCalls) {
      const node = buildMsg(role, body, toolCalls);
      chatLog.appendChild(node);
      chatLog.scrollTop = chatLog.scrollHeight;
      return node;
    }

    /** 思考中占位气泡 */
    function appendTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="body typing"><span></span><span></span><span></span></div>
        </div>`;
      chatLog.appendChild(wrap);
      chatLog.scrollTop = chatLog.scrollHeight;
      return wrap;
    }

    async function sendChat(q) {
      const text = (q || $('chatInput').value || '').trim();
      if (!text) return;
      $('chatInput').value = '';
      appendMsg('user', text);

      const placeholder = appendTyping();
      $('btnSend').disabled = true;

      try {
        const resp = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await resp.json();
        chatLog.removeChild(placeholder);
        if (!data.ok) {
          appendMsg('bot', '出错了：' + (data.error || '未知错误'));
        } else {
          appendMsg('bot', data.content || '(无内容)', data.toolCalls);
        }
      } catch (e) {
        chatLog.removeChild(placeholder);
        appendMsg('bot', '请求失败：' + e.message);
      } finally {
        $('btnSend').disabled = false;
      }
    }

    $('btnSend').addEventListener('click', () => sendChat());
    $('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendChat();
    });
    document.querySelectorAll('.quick button').forEach((btn) => {
      btn.addEventListener('click', () => sendChat(btn.getAttribute('data-q')));
    });
  </script>
</body>
</html>
